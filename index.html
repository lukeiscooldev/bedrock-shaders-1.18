<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
      background: linear-gradient(135deg, black, gray, white);
      min-height: 100vh;
      }
      
      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        max-width: 300px;
        margin: 20px;
      }

      .card h2 {
        color: #333;
        margin-bottom: 10px;
      }

      .card p {
        color: #666;
        margin-bottom: 15px;
      }

      .card button {
        width: 100%;
        padding: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      .card button:hover {
        background: #0056b3;
      }

      img {
       width: 270px;
       height: 200px;
       object-fit: cover;
       border-radius: 10px;
      }
    </style>
    <title>Minecraft Bedrock Shaders</title>
  </head>
  <body>
    <div class="card">
      <img src="./lv_0_20260425213723.jpg" alt="SEUS PE Image" loading="lazy">
      <h2>SUES PE Remake</h2>
      <p>A Realism Shader inspired by different shaders!</p>
      <button>Info</button>
    </div>
    <div class="card">
      <img src=./Images/lv_0_20260425213702.jpg">
      <h2>Yamarin's Legacy</h2>
      <p>Realism Based Shader</p>
      <button>Info</button>
    </div>
  </body>
</html>
